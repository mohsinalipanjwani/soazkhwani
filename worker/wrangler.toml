# Cloudflare Worker configuration for the Noha Directory API.
#
# This config lives in worker/ (NOT the repo root) on purpose: Cloudflare Pages
# reads a root-level wrangler.toml and fails if it finds a Worker config (one
# with `main`). Keeping it here leaves the root clean so Pages can auto-deploy
# the React frontend from Git.
#
# Deploy the Worker from the repo root with:  npm run worker:deploy
# (which passes  -c worker/wrangler.toml  so paths below resolve correctly).
#
# Keep these names consistent across the whole project:
#   Worker name : noha-directory-api
#   D1 database : noha-directory
#   R2 bucket   : noha-images
#   Editor key  : EDITOR_KEY  (set with `npm run worker:secret`)

name = "noha-directory-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"

# --- D1 (SQLite) binding -----------------------------------------------------
[[d1_databases]]
binding = "DB"
database_name = "noha-directory"
database_id = "ae62de05-0db1-48e1-8d76-2bb32611a3d8"

# --- R2 (image storage) binding ---------------------------------------------
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "noha-images"

# --- Public config -----------------------------------------------------------
# Comma-separated list of origins allowed to call the API (your Pages site and
# local dev). "*" allows any origin. EDITOR_KEY is a SECRET, not set here.
[vars]
ALLOWED_ORIGINS = "*"
